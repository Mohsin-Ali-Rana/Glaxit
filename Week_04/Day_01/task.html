<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Stopwatch</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-circle circle1"></div>
    <div class="background-circle circle2"></div>

    <div class="container">
        <div class="stopwatch-card">
            <h1>Digital Stopwatch</h1>
            <p class="subtitle">Measure every millisecond with precision.</p>

            <div class="time" id="display">
                00:00:00
            </div>

            <div class="buttons">
                <button id="start" class="btn start">Start</button>
                <button id="stop" class="btn stop">Stop</button>
                <button id="reset" class="btn reset">Reset</button>
            </div>
        </div>
    </div>

    <script src="run.js"></script>

</body>
</html>
